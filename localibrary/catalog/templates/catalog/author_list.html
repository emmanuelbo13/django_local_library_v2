{% extends 'layout.html' %}

{% block content %}
    <h1>Authors</h1>
    <hr>
    {% if author_list %}
        <ul>
            {% for author in author_list %}
                <li>
                    <a href="{{author.get_absolute_url}}">{{author.last_name}}, {{author.last_name}}</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>There are no books in the library</p>
    {% endif %}
{% endblock %}
