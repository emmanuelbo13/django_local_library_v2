{% extends 'layout.html' %}

{% block content %}
    <h1>{{author.first_name}} {{author.last_name}}</h1>
    <hr>
    <h3>Books</h3>
    <ul>
        {% for book in author.book_set.all %}
            <li><a href="{{book.get_absolute_url}}">{{book.title}}</a>
                {{book.bookinstance_set.count}}
            </li>
        {% endfor %}
    </ul>
{% endblock %}
